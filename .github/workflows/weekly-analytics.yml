name: Weekly Analytics Pipeline

on:
  schedule:
    # Every Monday at 8am ET (12:00 UTC)
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout shared pipeline
        uses: actions/checkout@v4
        with:
          repository: RecoveryBiometrics/agent-command-center
          path: .shared-pipeline
          sparse-checkout: |
            pipelines/analytics
            businesses
            state

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .shared-pipeline/pipelines/analytics

      - name: Run analytics pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          BUSINESS_PROJECT_PATH: ${{ github.workspace }}
        run: node index.js --business globalhighlevel
        working-directory: .shared-pipeline/pipelines/analytics
