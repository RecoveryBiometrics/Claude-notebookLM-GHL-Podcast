<style>
:root {
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #0d1117;
  --bg-card: #162032;
  --bg-offer: #0c2d1f;
  --text-primary: #f1f5f9;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-blue-hover: #2563eb;
  --accent-green: #1DB954;
  --accent-green-hover: #1aa34a;
  --accent-orange: #f59e0b;
  --accent-purple: #8b5cf6;
  --border-subtle: rgba(148, 163, 184, 0.1);
  --border-card: rgba(148, 163, 184, 0.08);
  --gradient-hero: linear-gradient(165deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
  --gradient-offer: linear-gradient(165deg, #042f1a 0%, #0c4a2e 50%, #06301d 100%);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.2);
  --shadow-button: 0 2px 8px rgba(59,130,246,0.3);
  --max-width: 1200px;
  --section-padding: 64px 20px;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  max-width: 100%;
  height: auto;
}

/* ── NAV ── */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
}

.nav-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
}

.nav-logo {
  font-size: 16px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.nav-logo .logo-icon {
  width: 28px;
  height: 28px;
  background: var(--accent-blue);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 900;
  color: white;
  flex-shrink: 0;
}

.nav-links {
  display: none;
  list-style: none;
  gap: 32px;
  align-items: center;
}

.nav-links a {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
  transition: color 0.2s;
  white-space: nowrap;
}

.nav-links a:hover {
  color: var(--text-primary);
}

.nav-cta {
  display: none;
}

.nav-cta a {
  display: inline-flex;
  align-items: center;
  padding: 8px 18px;
  background: var(--accent-blue);
  color: white;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  transition: background 0.2s;
  white-space: nowrap;
}

.nav-cta a:hover {
  background: var(--accent-blue-hover);
}

.hamburger {
  display: flex;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 8px;
  min-height: 44px;
  min-width: 44px;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
}

.hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--text-secondary);
  border-radius: 2px;
  transition: all 0.3s;
}

.mobile-menu {
  display: none;
  position: fixed;
  top: 60px;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(15, 23, 42, 0.98);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 999;
  padding: 32px 20px;
}

.mobile-menu.is-open {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.mobile-menu a {
  display: flex;
  align-items: center;
  padding: 16px;
  font-size: 16px;
  font-weight: 500;
  color: var(--text-secondary);
  border-radius: var(--radius-md);
  min-height: 52px;
  transition: all 0.2s;
}

.mobile-menu a:hover {
  background: var(--bg-card);
  color: var(--text-primary);
}

.mobile-menu .mobile-cta {
  margin-top: 16px;
  padding: 16px;
  background: var(--accent-blue);
  color: white;
  font-weight: 600;
  border-radius: var(--radius-md);
  text-align: center;
  justify-content: center;
}

/* ── HERO ── */
.hero {
  position: relative;
  padding: 120px 20px 64px;
  background: var(--gradient-hero);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image:
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(59,130,246,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 300px at 80% 30%, rgba(139,92,246,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.hero::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: radial-gradient(rgba(148,163,184,0.03) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

.hero-inner {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: rgba(59,130,246,0.1);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent-blue);
  margin-bottom: 24px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.hero h1 {
  font-size: 32px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -1px;
  color: var(--text-primary);
  margin-bottom: 16px;
}

.hero h1 .gradient-text {
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 32px;
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
}

.hero-ctas {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  margin-bottom: 40px;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 32px;
  background: var(--accent-blue);
  color: white;
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-md);
  min-height: 52px;
  width: 100%;
  max-width: 380px;
  transition: all 0.2s;
  box-shadow: var(--shadow-button);
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  background: var(--accent-blue-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(59,130,246,0.4);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 14px 28px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  border-radius: var(--radius-md);
  min-height: 48px;
  width: 100%;
  max-width: 380px;
  border: 1px solid var(--border-subtle);
  transition: all 0.2s;
  cursor: pointer;
}

.btn-secondary:hover {
  border-color: var(--text-muted);
  color: var(--text-primary);
  background: rgba(148,163,184,0.05);
}

.trust-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 24px;
  padding-top: 32px;
  border-top: 1px solid var(--border-subtle);
}

.trust-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
}

.trust-item .trust-icon {
  font-size: 16px;
}

.trust-item strong {
  color: var(--text-secondary);
  font-weight: 700;
}

/* ── SOCIAL PROOF BAR ── */
.proof-bar {
  padding: 40px 20px;
  background: var(--bg-tertiary);
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
}

.proof-bar-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  text-align: center;
}

.proof-stat {
  padding: 16px;
}

.proof-stat .number {
  font-size: 36px;
  font-weight: 800;
  color: var(--text-primary);
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 4px;
}

.proof-stat .label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── WHO THIS IS FOR ── */
.who-section {
  padding: var(--section-padding);
  background: var(--bg-primary);
}

.section-inner {
  max-width: var(--max-width);
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 48px;
}

.section-label {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--accent-blue);
  margin-bottom: 12px;
}

.section-title {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.2;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.section-subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.6;
}

.audience-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.audience-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  transition: all 0.3s;
}

.audience-card:hover {
  border-color: rgba(59,130,246,0.2);
  transform: translateY(-2px);
  box-shadow: var(--shadow-card);
}

.audience-card .card-icon {
  font-size: 32px;
  margin-bottom: 16px;
  display: block;
}

.audience-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.audience-card p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ── WHAT YOU GET ── */
.benefits-section {
  padding: var(--section-padding);
  background: var(--bg-secondary);
}

.benefits-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.benefit-card {
  background: var(--bg-primary);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  transition: all 0.3s;
}

.benefit-card:hover {
  border-color: rgba(139,92,246,0.2);
  transform: translateY(-2px);
  box-shadow: var(--shadow-card);
}

.benefit-card .benefit-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 16px;
}

.benefit-card:nth-child(1) .benefit-icon { background: rgba(59,130,246,0.12); }
.benefit-card:nth-child(2) .benefit-icon { background: rgba(139,92,246,0.12); }
.benefit-card:nth-child(3) .benefit-icon { background: rgba(245,158,11,0.12); }

.benefit-card h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.2px;
}

.benefit-card p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ── MID CTA ── */
.mid-cta {
  padding: 56px 20px;
  background: var(--bg-primary);
  text-align: center;
  border-top: 1px solid var(--border-subtle);
  border-bottom: 1px solid var(--border-subtle);
}

.mid-cta-inner {
  max-width: 600px;
  margin: 0 auto;
}

.mid-cta p {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  line-height: 1.6;
}

.mid-cta .btn-primary {
  max-width: 380px;
}

.mid-cta .offer-note {
  margin-top: 12px;
  font-size: 12px;
  color: var(--text-muted);
}

/* ── THE OFFER ── */
.offer-section {
  padding: 72px 20px;
  background: var(--gradient-offer);
  position: relative;
  overflow: hidden;
}

.offer-section::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-image: radial-gradient(rgba(29,185,84,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
}

.offer-inner {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  text-align: center;
}

.offer-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  background: rgba(29,185,84,0.15);
  border: 1px solid rgba(29,185,84,0.25);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-green);
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.offer-section .section-title {
  font-size: 28px;
  margin-bottom: 16px;
}

.offer-comparison {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin: 32px 0;
  flex-wrap: wrap;
}

.offer-box {
  padding: 20px 24px;
  border-radius: var(--radius-md);
  min-width: 140px;
  flex: 1;
  max-width: 220px;
}

.offer-box.standard {
  background: rgba(148,163,184,0.08);
  border: 1px solid rgba(148,163,184,0.1);
}

.offer-box.exclusive {
  background: rgba(29,185,84,0.1);
  border: 2px solid rgba(29,185,84,0.35);
  position: relative;
}

.offer-box .box-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 700;
  margin-bottom: 8px;
}

.offer-box.standard .box-label { color: var(--text-muted); }
.offer-box.exclusive .box-label { color: var(--accent-green); }

.offer-box .box-days {
  font-size: 40px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -1px;
}

.offer-box.standard .box-days {
  color: var(--text-muted);
  text-decoration: line-through;
  text-decoration-color: rgba(148,163,184,0.4);
}

.offer-box.exclusive .box-days { color: var(--text-primary); }

.offer-box .box-sub {
  font-size: 13px;
  color: var(--text-muted);
}

.offer-box.exclusive .box-sub { color: var(--text-secondary); }

.offer-details {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 32px;
  line-height: 1.7;
}

.btn-offer {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 18px 40px;
  background: var(--accent-green);
  color: white;
  font-size: 16px;
  font-weight: 700;
  border-radius: var(--radius-md);
  min-height: 56px;
  width: 100%;
  max-width: 380px;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(29,185,84,0.3);
  border: none;
  cursor: pointer;
}

.btn-offer:hover {
  background: var(--accent-green-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(29,185,84,0.4);
}

.offer-note {
  margin-top: 16px;
  font-size: 12px;
  color: var(--text-muted);
}

/* ── TUTORIALS ── */
.tutorials-section {
  padding: var(--section-padding);
  background: var(--bg-primary);
}

.tutorials-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.tutorial-card {
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-lg);
  padding: 24px;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
}

.tutorial-card:hover {
  border-color: rgba(59,130,246,0.2);
  transform: translateY(-2px);
  box-shadow: var(--shadow-card);
}

.tutorial-badge {
  display: inline-flex;
  align-self: flex-start;
  padding: 4px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}

.tutorial-badge.automation { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
.tutorial-badge.ai { background: rgba(139,92,246,0.12); color: var(--accent-purple); }
.tutorial-badge.funnels { background: rgba(245,158,11,0.12); color: var(--accent-orange); }

.tutorial-card h3 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 8px;
  line-height: 1.3;
  letter-spacing: -0.2px;
}

.tutorial-card p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 16px;
  flex-grow: 1;
}

.tutorial-link {
  font-size: 14px;
  font-weight: 600;
  color: var(--accent-blue);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: gap 0.2s;
}

.tutorial-link:hover {
  gap: 8px;
}

.tutorials-more {
  text-align: center;
  margin-top: 32px;
}

/* ── PODCAST ── */
.podcast-section {
  padding: var(--section-padding);
  background: var(--bg-secondary);
}

.podcast-inner {
  max-width: var(--max-width);
  margin: 0 auto;
}

.podcast-card {
  background: var(--bg-primary);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-xl);
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow: hidden;
  position: relative;
}

.podcast-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-green), #1ed760);
}

.podcast-artwork {
  width: 100%;
  max-width: 200px;
  aspect-ratio: 1;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  border: 1px solid var(--border-subtle);
}

.podcast-artwork .artwork-emoji {
  font-size: 48px;
  margin-bottom: 8px;
}

.podcast-artwork .artwork-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  padding: 0 12px;
}

.podcast-content {
  text-align: center;
}

.podcast-content h3 {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}

.podcast-content .podcast-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.6;
}

.podcast-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.podcast-stat {
  text-align: center;
}

.podcast-stat .stat-num {
  font-size: 22px;
  font-weight: 800;
  color: var(--text-primary);
  line-height: 1;
}

.podcast-stat .stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.podcast-top {
  padding: 12px 16px;
  background: rgba(29,185,84,0.08);
  border: 1px solid rgba(29,185,84,0.15);
  border-radius: var(--radius-md);
  margin-bottom: 24px;
}

.podcast-top .top-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--accent-green);
  margin-bottom: 4px;
}
